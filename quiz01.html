    // Fisher-Yates (tasowanie pytań)
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function App() {
        const [queue, setQueue] = useState([]);
        const [masteredCount, setMasteredCount] = useState(0);
        const totalQuestions = rawQuestions.length;

        const [selectedOption, setSelectedOption] = useState(null);
        const [hasAnswered, setHasAnswered] = useState(false);
        const [isCorrect, setIsCorrect] = useState(null);
        const [showTrivia, setShowTrivia] = useState(false);
        const [showHint, setShowHint] = useState(false);
        const [isFinished, setIsFinished] = useState(false);

        const [soundEnabled, setSoundEnabled] = useState(true);

        // Audio Context synthesis (no external assets required)
        const playSound = (type) => {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                if (type === 'correct') {
                    // High, happy "ding" (C5, fading quickly)
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.05); // quick slide to A5
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    // Low, descending "buzz"
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'click') {
                    // Subtle UI click
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0.02, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05);
                }
            } catch (e) {
                console.log("Audio not supported or blocked by browser.");
            }
        };

        useEffect(() => {
            startQuiz();
        }, []);

        const startQuiz = () => {
            setQueue(shuffleArray([...rawQuestions]));
            setMasteredCount(0);
            setSelectedOption(null);
            setHasAnswered(false);
            setIsCorrect(null);
            setShowTrivia(false);
            setShowHint(false);
            setIsFinished(false);
        };

        const handleOptionClick = (idx) => {
            if (hasAnswered) return;

            setSelectedOption(idx);
            setHasAnswered(true);

            const currentQ = queue[0];
            if (idx === currentQ.ans) {
                setIsCorrect(true);
                playSound('correct');
                setMasteredCount((prev) => prev + 1);
            } else {
                setIsCorrect(false);
                playSound('wrong');
            }
        };

        const handleNext = () => {
            playSound('click');
            const currentQ = queue[0];
            let newQueue = [...queue];
            newQueue.shift(); // Remove from front

            if (!isCorrect) {
                newQueue.push(currentQ); // Move to the end if wrong
            }

            if (newQueue.length === 0) {
                setIsFinished(true);
            } else {
                setQueue(newQueue);
                setSelectedOption(null);
                setHasAnswered(false);
                setIsCorrect(null);
                setShowTrivia(false);
                setShowHint(false);
            }
        };

        if (isFinished) {
            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
                    <div className="bg-white p-6 sm:p-10 rounded-3xl shadow-xl max-w-lg w-full text-center">
                        <div
                            className="w-20 h-20 sm:w-24 sm:h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <IconCheckCircle className="w-10 h-10 sm:w-12 sm:h-12 text-green-600"/>
                        </div>
                        <h1 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-4">Gratulacje!</h1>
                        <p className="text-sm sm:text-base text-slate-600 mb-8">
                            Udało Ci się opanować całe 50 zagadnień z filozofii. Egzamin to będzie czysta formalność.
                        </p>
                        <button
                            onClick={startQuiz}
                            className="flex items-center justify-center space-x-2 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 sm:py-4 px-6 rounded-2xl font-semibold transition-all active:scale-95"
                        >
                            <IconRefreshCw className="w-5 h-5"/>
                            <span>Rozpocznij ponownie</span>
                        </button>
                    </div>
                </div>
            );
        }

        if (queue.length === 0) return null; // Loading stat buffer

        const currentQ = queue[0];

        return (
            <div
                className="min-h-screen bg-slate-100 py-4 sm:py-8 px-3 sm:px-6 font-sans text-slate-800 flex justify-center selection:bg-indigo-200">
                <div className="max-w-3xl w-full flex flex-col">

                    {/* Header / Progress Bar */}
                    <div
                        className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm mb-4 sm:mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div className="flex items-center justify-between w-full sm:w-auto">
                            <div className="flex items-center space-x-3 sm:space-x-4">
                                <div className="bg-indigo-50 p-2 sm:p-3 rounded-xl hidden xs:block">
                                    <IconBrain className="w-6 h-6 sm:w-8 sm:h-8 text-indigo-500"/>
                                </div>
                                <div>
                                    <h1 className="text-lg sm:text-xl font-bold text-slate-800 leading-tight">Filozoficzny
                                        Trening</h1>
                                    <p className="text-xs sm:text-sm text-slate-500">Pozostało w puli: <span
                                        className="font-semibold">{queue.length}</span></p>
                                </div>
                            </div>

                            {/* Audio Toggle (Mobile friendly placement) */}
                            <button
                                onClick={() => {
                                    setSoundEnabled(!soundEnabled);
                                    playSound('click');
                                }}
                                className="sm:hidden p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-full transition-colors"
                                aria-label="Wycisz/Włącz dźwięk"
                            >
                                {soundEnabled ? <IconVolume2 className="w-6 h-6"/> : <IconVolumeX className="w-6 h-6"/>}
                            </button>
                        </div>

                        <div className="flex items-center justify-between sm:justify-end gap-6 w-full sm:w-auto">
                            <button
                                onClick={() => {
                                    setSoundEnabled(!soundEnabled);
                                    playSound('click');
                                }}
                                className="hidden sm:block p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-full transition-colors"
                                title="Wycisz/Włącz dźwięki"
                            >
                                {soundEnabled ? <IconVolume2 className="w-5 h-5"/> : <IconVolumeX className="w-5 h-5"/>}
                            </button>
                            <div className="w-full sm:w-32 text-left sm:text-right">
                                <div
                                    className="text-xs sm:text-sm font-semibold text-indigo-600 mb-1.5 flex justify-between sm:block">
                                    <span>Opanowane:</span> <span>{masteredCount} / {totalQuestions}</span>
                                </div>
                                <div
                                    className="w-full sm:w-32 h-2.5 bg-slate-100 rounded-full overflow-hidden relative border border-slate-200">
                                    <div
                                        className="absolute left-0 top-0 h-full bg-indigo-500 transition-all duration-500 ease-out rounded-full"
                                        style={{width: `${(masteredCount / totalQuestions) * 100}%`}}
                                    ></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Question Card */}
                    <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-md mb-6 relative flex-grow flex flex-col">
                        <div className="flex justify-between items-start gap-4 mb-6 sm:mb-8">
                            <h2 className="text-base sm:text-lg md:text-xl font-medium leading-relaxed text-slate-800">
                                {currentQ.q}
                            </h2>
                            {!hasAnswered && (
                                <button
                                    onClick={() => {
                                        playSound('click');
                                        setShowHint(!showHint);
                                    }}
                                    className={`shrink-0 flex items-center justify-center p-2.5 sm:p-3 rounded-xl transition-all ${showHint ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-400 hover:text-amber-500 hover:bg-amber-50'}`}
                                    title="Pokaż naprowadzającą podpowiedź"
                                >
                                    <IconLightbulb className="w-5 h-5 sm:w-6 sm:h-6"/>
                                </button>
                            )}
                        </div>

                        {showHint && (
                            <div
                                className="mb-6 p-4 sm:p-5 bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 rounded-xl flex items-start space-x-3 text-amber-900 animate-in fade-in slide-in-from-top-2">
                                <IconLightbulb className="w-6 h-6 text-amber-500 shrink-0 mt-0.5"/>
                                <div className="text-sm sm:text-base leading-relaxed">
                                    <span className="font-bold block mb-1 text-amber-700">Podpowiedź:</span>
                                    {currentQ.hint}
                                </div>
                            </div>
                        )}

                        <div className="space-y-3 sm:space-y-4 mb-4 sm:mb-8 flex-grow">
                            {currentQ.options.map((opt, idx) => {
                                let btnStyle = "bg-white border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-indigo-300";
                                let textStyle = "";

                                if (hasAnswered) {
                                    if (idx === currentQ.ans) {
                                        btnStyle = "bg-green-50 border-green-500 text-green-900 shadow-sm";
                                        textStyle = "font-medium";
                                    } else if (idx === selectedOption) {
                                        btnStyle = "bg-red-50 border-red-500 text-red-900";
                                    } else {
                                        btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                                    }
                                }

                                return (
                                    <button
                                        key={idx}
                                        onClick={() => handleOptionClick(idx)}
                                        disabled={hasAnswered}
                                        className={`w-full text-left p-4 sm:p-5 rounded-xl border-2 transition-all duration-200 flex gap-4 items-center justify-between active:scale-[0.98] ${btnStyle}`}
                                    >
                                        <span className={`text-sm sm:text-base leading-snug ${textStyle}`}>{opt}</span>
                                        {hasAnswered && idx === currentQ.ans && <IconCheckCircle
                                            className="w-5 h-5 sm:w-6 sm:h-6 text-green-600 shrink-0"/>}
                                        {hasAnswered && idx === selectedOption && !isCorrect &&
                                            <IconXCircle className="w-5 h-5 sm:w-6 sm:h-6 text-red-500 shrink-0"/>}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Feedback & Actions */}
                        <div
                            className="mt-auto border-t border-slate-100 pt-5 sm:pt-6 flex flex-col-reverse sm:flex-row items-center justify-between gap-4">
                            <button
                                onClick={() => {
                                    playSound('click');
                                    setShowTrivia(true);
                                }}
                                className="flex items-center justify-center space-x-2 text-indigo-600 hover:bg-indigo-50 w-full sm:w-auto px-5 py-3 rounded-xl font-semibold transition-colors border border-transparent hover:border-indigo-100"
                            >
                                <IconInfo className="w-5 h-5"/>
                                <span>Ciekawostka</span>
                            </button>

                            {hasAnswered && (
                                <div className="flex flex-col sm:flex-row items-center gap-3 sm:gap-5 w-full sm:w-auto">
                                        <span
                                            className={`text-sm sm:text-base font-semibold w-full text-center sm:text-right ${isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                                            {isCorrect ? "Znakomita odpowiedź!" : "Pytanie powróci na koniec."}
                                        </span>
                                    <button
                                        onClick={handleNext}
                                        className="w-full sm:w-auto flex items-center justify-center space-x-2 bg-slate-800 hover:bg-slate-900 text-white px-8 py-3.5 sm:py-3 rounded-xl font-semibold transition-all active:scale-95 shadow-md hover:shadow-lg"
                                    >
                                        <span>Dalej</span>
                                        <IconArrowRight className="w-5 h-5"/>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Trivia Dialog (Modal) */}
                    {showTrivia && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm"
                            onClick={() => setShowTrivia(false)}>
                            <div
                                className="bg-white rounded-3xl shadow-2xl p-6 sm:p-8 max-w-md w-full relative max-h-[90vh] overflow-y-auto transform transition-all duration-300"
                                onClick={(e) => e.stopPropagation()} // Zapobieganie zamykaniu po kliknięciu W modal
                            >
                                <button
                                    onClick={() => {
                                        playSound('click');
                                        setShowTrivia(false);
                                    }}
                                    className="absolute top-4 right-4 p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-700 rounded-full transition-colors"
                                    aria-label="Zamknij"
                                >
                                    <IconX className="w-6 h-6"/>
                                </button>

                                <div className="flex items-center space-x-4 mb-5 mt-2">
                                    <div className="p-3 bg-indigo-100 text-indigo-600 rounded-2xl">
                                        <IconInfo className="w-7 h-7"/>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-slate-800">Czy wiesz, że...?</h3>
                                </div>

                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-6">
                                    <p className="text-slate-700 leading-relaxed text-base sm:text-lg italic">
                                        "{currentQ.trivia}"
                                    </p>
                                </div>

                                <button
                                    onClick={() => {
                                        playSound('click');
                                        setShowTrivia(false);
                                    }}
                                    className="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3.5 rounded-xl transition-colors active:scale-[0.98]"
                                >
                                    Zamknij okno
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
